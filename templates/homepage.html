<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homepage: {{session.get('username')}} </title>
    <link rel="shortcut icon" href=" {{url_for('static',filename= 'img/favicon.svg')}}" type="image/x-icon">
</head>
<style>
    :root {
        --white: #e9edfc;
        --blue: #1a146f;
    }

    .pfp {
        border-radius: 100%;
        aspect-ratio: 1/1;
        height: 80%;
        cursor: pointer;
        border: black solid 2px;
    }

    body {
        background-color: var(--white);
    }

    header {
        background-color: var(--blue);
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 10%;
        display: flex;
        flex-flow: row-reverse nowrap;
        justify-content: center;
        gap: 85%;
        align-items: center;
    }

    .nameplate {
        color: var(--white);
    }


    footer {
        background-color: var(--blue);
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 10%;
        display: flex;
        flex-flow: row-reverse nowrap;
        justify-content: end;
        gap: 20px;
        align-items: center;
    }

    main {
        background-color: var(--blue);
        position: fixed;
        top: 20%;
        left: 10%;
        width: 80%;
        height: 60%;

        color: var(--white);

    }

    main div {
        margin: 1%;
        width: 98%;
        height: 30%;
    }

    main div:nth-child(2) {
        display: flex;
        background-color: var(--white);
        height: 60%;
    }
</style>

<body>
    <header>
        <a href="{{url_for('user_page', id = session.get('user_id'))}}">
            <img class="pfp"
                src="https://ui-avatars.com/api/?background=fc5953&color=fff&name={{session.get('username')}}"
                alt="{{session.get('username')}}">
        </a>

        <h1 class="nameplate">{{session.get('username')}} </h1>
    </header>
    <main>
        <div>
            {% if session.get('role') == 'admin' %}
            hello admin user: {{session.get('username')}}
            {% else %}
            hello user
            {% endif %}
        </div>
        <div>
             <a href="{{url_for('newwebsite')}}">
                <button>new website</button>
             </a>
        </div>
    </main>
    <footer>
        <div></div>
        <a href=" {{url_for('logout')}}"> <button>logout</button></a>

    </footer>
</body>

</html>
