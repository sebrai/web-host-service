<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homepage: {{session.get('username')}} </title>
    <link rel="shortcut icon" href=" {{url_for('static',filename= 'img/favicon.svg')}}" type="image/x-icon">
</head>
<style>
    :root {
        --white: #e9edfc;
        --blue: #1a146f;
    }

    .pfp {
        border-radius: 100%;
        aspect-ratio: 1/1;
        max-height: 60px;
        cursor: pointer;
        border: black solid 2px;
    }

    body {
        background-color: var(--white);
    }

    header {
        background-color: var(--blue);
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 80px;

        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-direction: row-reverse;

        padding: 0 20px;
        box-sizing: border-box;
        overflow: hidden;
    }

    .nameplate {
        color: var(--white);
    }


    footer {
        background-color: var(--blue);
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 10%;
        display: flex;
        flex-flow: row-reverse nowrap;
        justify-content: end;
        gap: 20px;
        align-items: center;
    }

    main {
        background-color: var(--blue);
        position: fixed;
        top: 20%;
        left: 10%;
        width: 80%;
        height: 60%;

        color: var(--white);

    }

    main div {
        margin: 1%;
        width: 98%;
        height: 10%;
    }

    main div:nth-child(2):not(.webs) {
        display: flex;
        background-color: var(--white);
        height: 80%;
        flex-wrap: wrap;
    }

    .webs {
        background-color: var(--blue);
        border-radius: 15px;
        max-width: 20%;
        min-height: 40%;
        padding-left: 10px;

    }

    .webs a {
        color: var(--white);
    }
</style>

<body>
    <header>
        <a href="{{url_for('user_page', id = session.get('user_id'))}}">
            <img class="pfp" src="{% if current_user and current_user.get('pfp') %}
            data:{{ current_user.get('pfp_type', 'image/jpeg') }};base64,{{ current_user.get('pfp') }}
          {% else %}
            https://ui-avatars.com/api/?&color=000&name={{ session.get('username') }}
          {% endif %}" alt="{{ session.get('username') }}">
        </a>

        <h1 class="nameplate">{{session.get('username')}} </h1>
    </header>
    <main>
        <div>
            {% if session.get('role') == 'admin' %}
            hello admin user: {{session.get('username')}}
            {% else %}
            hello user
            {% endif %}
        </div>
        <div>
            {% for page in webpages %}
            <div class="webs">
                <h1>{{ page['title']}}</h1>
                <a href="{{url_for('visit',web_id = page['id'])}}">visit: {{page['title']}}</a> <br>
                <a href="{{url_for('changestatus',id = page['id'],old =page['private'] )}}"><button>
                        {% if page['private'] %}
                        make public
                        {% else %}
                        make private
                        {% endif %}
                    </button></a>
                {%if page['private'] %}
                <a href="{{url_for('m_acces',action = 'add_acces',id = page['id'])}}"><button>give acces</button></a>
                <a href="{{url_for('m_acces',action = 'remove_acces',id = page['id'])}}"><button>remove
                        acces</button></a>
                {% endif %}
                <a href="{{url_for('editweb',id = page['id'])}}">
                    <button>edit</button>
                </a>
                <a href="{{url_for('forum',id = page['id'])}}"><button>visit forum</button></a>
            </div>
            {% endfor %}
            <a href="{{url_for('newwebsite')}}">
                <button>new website</button>
            </a>
        </div>
    </main>
    <footer>
        <div></div>
        <a href=" {{url_for('logout')}}"> <button>logout</button></a>

    </footer>
</body>

</html>
